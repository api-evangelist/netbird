  exposes:
  - type: rest
    port: 8080
    namespace: netbird-rest
    description: REST adapter for NetBird REST API.
    resources:
    - path: /api/instance
      name: get-api-instance
      operations:
      - method: GET
        name: get-api-instance
        description: Get Instance Status
        call: netbird.get-api-instance
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/instance/version
