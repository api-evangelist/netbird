        description: Setup Instance
        call: netbird.post-api-setup
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/peers/{peerId}/jobs
      name: get-api-peers-peerid-jobs
      operations:
      - method: GET
        name: get-api-peers-peerid-jobs
        description: List Jobs
        call: netbird.get-api-peers-peerid-jobs
        with:
          peerId: rest.peerId
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/peers/{peerId}/jobs
      name: post-api-peers-peerid-jobs
      operations:
      - method: POST
        name: post-api-peers-peerid-jobs
