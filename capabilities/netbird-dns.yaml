      description: List all Nameserver Groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: netbird-dns.get
      outputParameters:
      - type: object
        mapping: $.
    - name: create-nameserver-group
      description: Create a Nameserver Group
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: netbird-dns.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-nameserver-group
      description: Retrieve a Nameserver Group
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: netbird-dns.get
      with:
        nsgroupId: tools.nsgroupId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-nameserver-group
      description: Update a Nameserver Group
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: netbird-dns.put
      with:
        nsgroupId: tools.nsgroupId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-nameserver-group
      description: Delete a Nameserver Group
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: netbird-dns.delete
      with:
        nsgroupId: tools.nsgroupId
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-dns-settings
      description: Retrieve DNS settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: netbird-dns.get
      outputParameters:
      - type: object
        mapping: $.
    - name: update-dns-settings
      description: Update DNS Settings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: netbird-dns.put
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
