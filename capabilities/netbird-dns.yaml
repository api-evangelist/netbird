  - type: http
    namespace: netbird-dns
    baseUri: https://api.netbird.io
    description: NetBird REST API — DNS business capability. Self-contained, no shared references.
    resources:
    - name: api-dns-nameservers
      path: /api/dns/nameservers
      operations:
      - name: get
        method: GET
        description: List all Nameserver Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Create a Nameserver Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-dns-nameservers-nsgroupId
      path: /api/dns/nameservers/{nsgroupId}
      operations:
      - name: get
        method: GET
        description: Retrieve a Nameserver Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: nsgroupId
          in: path
          type: string
          description: The unique identifier of a Nameserver Group
          required: true
      - name: put
        method: PUT
        description: Update a Nameserver Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: nsgroupId
          in: path
          type: string
          description: The unique identifier of a Nameserver Group
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: delete
        method: DELETE
        description: Delete a Nameserver Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: nsgroupId
          in: path
          type: string
          description: The unique identifier of a Nameserver Group
          required: true
    - name: api-dns-settings
      path: /api/dns/settings
      operations:
      - name: get
        method: GET
        description: Retrieve DNS settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: put
        method: PUT
        description: Update DNS Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.NETBIRD_API_KEY}}'
  exposes:
  - type: rest
    namespace: netbird-dns-rest
    port: 8080
    description: REST adapter for NetBird REST API — DNS. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/dns/nameservers
      name: api-dns-nameservers
      description: REST surface for api-dns-nameservers.
      operations:
      - method: GET
        name: get
        description: List all Nameserver Groups
        call: netbird-dns.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create a Nameserver Group
        call: netbird-dns.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/dns/nameservers/{nsgroupid}
      name: api-dns-nameservers-nsgroupid
      description: REST surface for api-dns-nameservers-nsgroupId.
      operations:
      - method: GET
        name: get
        description: Retrieve a Nameserver Group
        call: netbird-dns.get
        with:
          nsgroupId: rest.nsgroupId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: put
        description: Update a Nameserver Group
        call: netbird-dns.put
        with:
          nsgroupId: rest.nsgroupId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: Delete a Nameserver Group
        call: netbird-dns.delete
        with:
          nsgroupId: rest.nsgroupId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/dns/settings
      name: api-dns-settings
      description: REST surface for api-dns-settings.
      operations:
      - method: GET
        name: get
        description: Retrieve DNS settings
        call: netbird-dns.get
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: put
        description: Update DNS Settings
        call: netbird-dns.put
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: netbird-dns-mcp
    port: 9090
    transport: http
    description: MCP adapter for NetBird REST API — DNS. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
