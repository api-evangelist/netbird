    description: NetBird REST API — Routes business capability. Self-contained, no shared references.
    resources:
    - name: api-routes
      path: /api/routes
      operations:
      - name: get
        method: GET
        description: List all Routes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Create a Route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-routes-routeId
      path: /api/routes/{routeId}
      operations:
      - name: get
        method: GET
        description: Retrieve a Route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: routeId
          in: path
          type: string
          description: The unique identifier of a route
          required: true
      - name: put
        method: PUT
        description: Update a Route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: routeId
          in: path
          type: string
          description: The unique identifier of a route
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: delete
        method: DELETE
        description: Delete a Route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: routeId
          in: path
          type: string
          description: The unique identifier of a route
          required: true
    authentication:
      type: bearer
      token: '{{env.NETBIRD_API_KEY}}'
  exposes:
  - type: rest
    namespace: netbird-routes-rest
    port: 8080
    description: REST adapter for NetBird REST API — Routes. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/routes
      name: api-routes
      description: REST surface for api-routes.
      operations:
      - method: GET
        name: get
        description: List all Routes
        call: netbird-routes.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create a Route
        call: netbird-routes.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/routes/{routeid}
      name: api-routes-routeid
      description: REST surface for api-routes-routeId.
      operations:
      - method: GET
        name: get
        description: Retrieve a Route
        call: netbird-routes.get
        with:
          routeId: rest.routeId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: put
        description: Update a Route
        call: netbird-routes.put
        with:
          routeId: rest.routeId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: Delete a Route
        call: netbird-routes.delete
        with:
          routeId: rest.routeId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
