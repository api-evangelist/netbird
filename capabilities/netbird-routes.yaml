    port: 9090
    transport: http
    description: MCP adapter for NetBird REST API — Routes. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-routes
      description: List all Routes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: netbird-routes.get
      outputParameters:
      - type: object
        mapping: $.
    - name: create-route
      description: Create a Route
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: netbird-routes.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-route
      description: Retrieve a Route
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: netbird-routes.get
      with:
        routeId: tools.routeId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-route
      description: Update a Route
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: netbird-routes.put
      with:
        routeId: tools.routeId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-route
      description: Delete a Route
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: netbird-routes.delete
      with:
        routeId: tools.routeId
      outputParameters:
      - type: object
        mapping: $.
