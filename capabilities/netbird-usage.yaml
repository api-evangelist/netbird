naftiko: 1.0.0-alpha2
info:
  label: NetBird REST API — Usage
  description: 'NetBird REST API — Usage. 1 operations. Lead operation: Get current usage. Self-contained Naftiko capability
    covering one Netbird business surface.'
  tags:
  - Netbird
  - Usage
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NETBIRD_API_KEY: NETBIRD_API_KEY
capability:
  consumes:
  - type: http
    namespace: netbird-usage
    baseUri: https://api.netbird.io
    description: NetBird REST API — Usage business capability. Self-contained, no shared references.
    resources:
    - name: api-integrations-billing-usage
      path: /api/integrations/billing/usage
      operations:
      - name: get
        method: GET
        description: Get current usage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.NETBIRD_API_KEY}}'
  exposes:
  - type: rest
    namespace: netbird-usage-rest
    port: 8080
    description: REST adapter for NetBird REST API — Usage. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/integrations/billing/usage
      name: api-integrations-billing-usage
      description: REST surface for api-integrations-billing-usage.
      operations:
      - method: GET
        name: get
        description: Get current usage
        call: netbird-usage.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: netbird-usage-mcp
    port: 9090
    transport: http
    description: MCP adapter for NetBird REST API — Usage. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-current-usage
      description: Get current usage
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: netbird-usage.get
      outputParameters:
      - type: object
        mapping: $.
