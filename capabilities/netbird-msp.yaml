      name: api-integrations-msp-tenants
      description: REST surface for api-integrations-msp-tenants.
      operations:
      - method: GET
        name: get
        description: Get MSP tenants
        call: netbird-msp.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create MSP tenant
        call: netbird-msp.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
