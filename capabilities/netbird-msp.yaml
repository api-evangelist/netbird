        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-subscription-tenant
      description: Create subscription for Tenant
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: netbird-msp.post
      with:
