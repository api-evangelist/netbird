      description: REST surface for api-integrations-msp-tenants-id-invite.
      operations:
      - method: POST
        name: post
        description: Invite existing account as a Tenant to the MSP account
        call: netbird-msp.post
        with:
          id: rest.id
        outputParameters:
        - type: object
